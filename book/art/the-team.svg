  <circle cx="510" cy="104" r="24" fill="#fff"/>
  <path d="M488 96 l8 -8 l6 6 l7 -8 l7 8 l6 -6 l8 8" fill="#fff"/>
  <rect x="474" y="136" width="72" height="106" rx="24" fill="#fff"/>
  <circle cx="490" cy="160" r="3.5"/>
  <circle cx="530" cy="166" r="3.5"/>
  <circle cx="500" cy="222" r="3.5"/>
  <path d="M484 206 l12 -22 h40 l-12 22 z" fill="#fff"/>
  <line x1="480" y1="206" x2="540" y2="206"/>
