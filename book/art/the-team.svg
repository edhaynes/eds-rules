<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 310" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
  <!-- The crew: Jason, Claudius, Eddie, Claude, Claudina, Linda.
       Original B&W line art; print-safe, no color. -->

  <!-- counter line the crew stands behind -->
