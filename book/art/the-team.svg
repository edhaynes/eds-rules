  <circle cx="360" cy="90" r="7" fill="#fff"/>
  <circle cx="380" cy="90" r="7" fill="#fff"/>
  <line x1="367" y1="90" x2="373" y2="90"/>
  <path d="M356 108 q14 10 28 0"/>
  <rect x="330" y="126" width="80" height="116" rx="26" fill="#fff"/>
