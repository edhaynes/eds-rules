  <!-- ============ Jason (cx=90): PM, clipboard, flat cap hair ============ -->
  <circle cx="90" cy="104" r="24" fill="#fff"/>
  <path d="M66 98 q24 -14 48 0" fill="#fff"/>
  <rect x="54" y="136" width="72" height="106" rx="24" fill="#fff"/>
  <rect x="74" y="168" width="32" height="44" rx="3" fill="#fff"/>
  <rect x="83" y="162" width="14" height="9" rx="3" fill="#fff"/>
  <line x1="80" y1="182" x2="100" y2="182"/>
  <line x1="80" y1="192" x2="100" y2="192"/>
  <line x1="80" y1="202" x2="94" y2="202"/>
  <text x="90" y="278" font-family="Menlo, Consolas, monospace" font-size="15" fill="#000" stroke="none" text-anchor="middle">JASON</text>

  <!-- ========= Claudius (cx=230): architect, beard, scroll ========= -->
  <circle cx="230" cy="104" r="24" fill="#fff"/>
