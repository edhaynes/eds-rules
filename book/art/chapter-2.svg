  <line x1="80" y1="500" x2="640" y2="500"/>
  <line x1="110" y1="468" x2="610" y2="468"/>
  <line x1="140" y1="436" x2="580" y2="436"/>
  <!-- columns (4) -->
  <g>
    <line x1="190" y1="436" x2="190" y2="220"/>
    <line x1="214" y1="436" x2="214" y2="220"/>
    <rect x="180" y="204" width="44" height="16" fill="#fff"/>
    <rect x="184" y="420" width="36" height="16" fill="#fff"/>
  </g>
  <g>
    <line x1="300" y1="436" x2="300" y2="220"/>
    <line x1="324" y1="436" x2="324" y2="220"/>
    <rect x="290" y="204" width="44" height="16" fill="#fff"/>
    <rect x="294" y="420" width="36" height="16" fill="#fff"/>
  </g>
  <g>
    <line x1="410" y1="436" x2="410" y2="220"/>
    <line x1="434" y1="436" x2="434" y2="220"/>
    <rect x="400" y="204" width="44" height="16" fill="#fff"/>
    <rect x="404" y="420" width="36" height="16" fill="#fff"/>
  </g>
  <g>
    <line x1="520" y1="436" x2="520" y2="220"/>
