  </g>
  <!-- entablature + pediment -->
  <rect x="150" y="176" width="430" height="28" fill="#fff"/>
  <path d="M130 176 L365 60 L600 176 Z" fill="#fff"/>
  <!-- blueprint scroll leaning on the steps -->
  <rect x="86" y="380" width="26" height="110" rx="13" fill="#fff" transform="rotate(-18 99 435)"/>
  <ellipse cx="91" cy="389" rx="13" ry="9" fill="#fff" transform="rotate(-18 99 435)"/>
