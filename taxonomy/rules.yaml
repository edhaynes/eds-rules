# Canonical rule registry — single source of truth for the layered ruleset.
# compose.py generates the readable layer docs AND the per-seat slices from this.
#
# Layers (scope):  axiom | personal | project | employer
# priority: 0-100, drives which rules a budget-limited seat holds RESIDENT.
# triggers: task contexts that page a non-resident rule into context on demand.
#
# Counts here are deliberately small in the prefs layers — condensed/merged from
# the old flat 100 (grades.csv). Mis-scoped "low" rules (crew 33.5, stack 45.0)
# move to prefs and stop being graded as failed axioms.

meta:
  source: "RULES.md (flat 100, consolidated 2026-06-14)"
  model: "axiom core + composable preference layers; rules-as-cache-hierarchy"

# ─────────────────────────────── AXIOMS ───────────────────────────────
# Immutable, universal, every seat. Few by design (resident budget is tiny).
axioms:
  - {id: AX-SCAN,     title: "Secret scan before ship",         priority: 100, triggers: [commit, push, deploy], text: "Run a secret scan before every commit, push, and deploy. No scan, no ship — any agent, any target."}
  - {id: AX-NOSECRET, title: "Never hardcode secrets",          priority: 99,  triggers: [code, config, review], text: "Never hardcode secrets, keys, tokens, passwords, or private endpoints. Found one → stop and flag; never propagate, even temporarily."}
  - {id: AX-INPUT,    title: "Distrust every external input",   priority: 96,  triggers: [input, parse, query, path], text: "Validate and constrain every external input at the boundary: bounds/range/overflow checks, parameterized queries and commands, resolved+confined paths. Never interpolate untrusted data into SQL, a shell, HTML, or a deserializer."}
  - {id: AX-DESTROY,  title: "Destruction needs a human",       priority: 97,  triggers: [delete, drop, force-push, migrate], text: "Never delete files, drop tables, run destructive commands, force-push, or rewrite history without explicit human confirmation."}
  - {id: AX-LEASTPRIV,title: "Least privilege by default",      priority: 90,  triggers: [auth, deploy, credential], text: "Every credential, token, and role gets the narrowest scope that works. No wildcard perms, no shared admin keys; expire and rotate by default."}
  - {id: AX-HOOKS,    title: "Secret-scan hooks from day one",  priority: 88,  triggers: [repo-init, commit, push], text: "Secret-scanning hooks are mandatory in every repo, installed before the first commit: pre-commit (gitleaks + detect-secrets) and pre-push (rescan + tests). .gitignore covers keys/certs/.env* from day one."}
  - {id: AX-BURNED,   title: "A touched secret is burned",      priority: 87,  triggers: [leak, secret], text: "A secret that ever touched a commit is burned: rotate first, clean history second. Never copy a secret anywhere; during leak response surface it verbatim only to its owner."}
  - {id: AX-POWELL,   title: "The 90% rule (Powell)",           priority: 95,  triggers: [decide, route, ambiguity], text: "Get 90% of the information you need, then decide. Below 90%, ask — never guess ahead, never stall past 90%. Route by the same bar: ≥90% to a fast seat, 50-90% to a heavyweight, below/high-stakes to the human."}
  - {id: AX-AUTOVC,   title: "Autonomy bounded by version control", priority: 92, triggers: [write, autonomy], text: "An agent only writes inside a git repo with a synced remote. No recoverable history, no autonomy."}
  - {id: AX-PUSH,     title: "Push early, push always",         priority: 80,  triggers: [commit, push, session-end], text: "Working code lands on main frequently; uncommitted/unpushed work is a liability. AI handles messy merges, so the old reason to hoard local state is gone."}
  - {id: AX-GREEN,    title: "Green before commit, healthy before handover", priority: 89, triggers: [commit, handover, deploy], text: "Never commit while tests fail; never present a service as done without verifying it is up, healthy, and answering a real request."}
  - {id: AX-ONEPURP,  title: "One purpose per commit/deploy",   priority: 82,  triggers: [commit, deploy], text: "One purpose per commit, one per deploy. No 'while I'm in there' fixes; mechanical refactors are their own reviewable commit."}
  - {id: AX-FAILFAST, title: "Fail fast",                       priority: 85,  triggers: [startup, config, error], text: "Invalid config, missing deps, or unreachable backends crash loudly at startup with a clear message — never limp along degraded."}
  - {id: AX-DEPDISC,  title: "Disclose every dependency",       priority: 78,  triggers: [add-dependency], text: "Never add a dependency without stating name, purpose, license, maintenance status, and platform support."}
  - {id: AX-GRADE,    title: "Inspect, don't expect — grade to a rubric", priority: 84, triggers: [test, ship, review], text: "Test-driven, not test-after, and graded: every project keeps a rubric. 90% is the working bar, polish to 95%, publish nothing below 95%."}
  - {id: AX-REGRESS,  title: "Tests with logic; regression first", priority: 83, triggers: [feature, bugfix], text: "New logic ships with tests; bug fixes ship a regression test written failing-first, before the fix."}
  - {id: AX-CONTRACT, title: "Contract first",                  priority: 79,  triggers: [api, interface, feature], text: "Define and freeze the API/interface, write tests against the contract, then implement. Never the reverse."}
  - {id: AX-CORRECT,  title: "Correctness over speed",          priority: 81,  triggers: [test, ship], text: "The delay to reach verified behavior and full coverage is acceptable and expected. Never trade correctness for velocity."}
  - {id: AX-PLAN,     title: "Plan first for non-trivial work", priority: 86,  triggers: [task-start, nontrivial], text: "State the approach and the files to touch before editing. Never silently change scope — if the task is bigger than stated, stop and say so."}
  - {id: AX-NOFLAT,   title: "No flattery, no yes-manning",     priority: 76,  triggers: [always], text: "Agree only when it carries information; disagree plainly when the evidence warrants; defend your reasoning before capitulating."}
  - {id: AX-VERBATIM, title: "Verbatim errors; diffs; surfaced assumptions", priority: 75, triggers: [report, debug, change], text: "Quote errors verbatim, never paraphrase stack traces; show diffs not prose for 'what changed'; surface assumptions explicitly."}
  - {id: AX-HEADLESS, title: "No OS assumptions; script everything; headless", priority: 77, triggers: [script, deploy, tooling], text: "Never assume a path, OS, or shell — use cross-platform primitives. Assume headless: no display, nobody at a prompt. A manual procedure dies with the next reimage; a script is a git clone away."}
  - {id: AX-NOHARD,   title: "Zero hardcoded values",           priority: 88,  triggers: [code, config], text: "Zero hardcoded values for anything that could change — hosts, ports, model names, paths, timeouts, flags, prompts — and no magic numbers. Named constants or config only."}
  - {id: AX-COVER,    title: "100% line + branch coverage",     priority: 70,  triggers: [test, coverage], text: "100% line and branch coverage, every branch exercised and asserted; configure the runner to fail under it. (Borderline axiom/craft — Eddie holds it as non-negotiable.)"}

# ─────────────────────── PERSONAL / ARCHITECT PREFS ───────────────────
# The operator's opinions + crew + stack + fleet operation. YMMV by design.
layers:
  personal:
    # — engineering style (opinions; many disagree → prefs, not axioms) —
    - {id: P-ARCH,    title: "Architecture beats language",     priority: 60, triggers: [design], text: "Architecture matters more than language or framework."}
    - {id: P-OSS,     title: "Search open source first",        priority: 58, triggers: [build, design], text: "Before building anything, research what open source already solved (stars/forks signal quality); check the codebase for something to adapt before inventing."}
    - {id: P-DI,      title: "DI over globals; OO + SOLID",     priority: 55, triggers: [design, code], text: "Dependency injection over module globals/singletons; default to OO with single responsibilities; compose over inherit; apply SOLID where it earns its keep."}
    - {id: P-SWAP,    title: "Swappable interface per axis",    priority: 56, triggers: [design, integration], text: "Anything with a local-vs-cloud or vendor axis goes behind a swappable interface: LLM, storage, DB, cache, queue, auth, logging."}
    - {id: P-SIZE,    title: "Small files and functions",       priority: 52, triggers: [code, refactor], text: "Files ≤500 lines (never >1000; past 800 refactor); functions ≤50 lines, ≤5 params; extract past ~3 nesting levels; no god classes; size refactors are their own commit."}
    - {id: P-CONFIG,  title: "One config layer; validate at start", priority: 54, triggers: [config, startup], text: "All config flows through one layer (env → .env → file → CLI, increasing precedence); validate at startup naming the bad key; never silently fall back; ship a .env.example; run locally with zero setup."}
    - {id: P-ERRORS,  title: "Disciplined errors + logging",    priority: 53, triggers: [error, logging], text: "No bare except/catch swallows; cleanup via context managers/defer/using; a logger never print, structured once past a script; loud in dev, graceful in prod, diagnosable always; AI errors surface as friendly messages."}
    - {id: P-DEPS,    title: "Pin, lock, audit; stdlib+one",    priority: 51, triggers: [dependency], text: "Pin versions, commit the lockfile, audit on every new dep; prefer stdlib plus one well-maintained dep over five; Python work in a project-local virtualenv."}
    - {id: P-HYGIENE, title: "Hygiene: lint, dead-code, no cruft", priority: 50, triggers: [commit, post-feature, release], text: "Lint+format every commit, CI green; dead-code pass after features; cleanup sweep first after a stable release; no commented-out code; no orphan TODOs (tracker link or dated FIXME+owner)."}
    - {id: P-VERSION, title: "Versioning discipline",           priority: 49, triggers: [release, tag], text: "SemVer in one canonical place; versions only move forward; tags immutable (fetch remote before tagging, push by name); unique monotonic build number; changelog rides the bump; show the version everywhere."}
    - {id: P-DOCS,    title: "Living memory: STATE/ADR/trackers", priority: 57, triggers: [decision, session, commit], text: "A per-repo STATE.md (≤1024 words) ingested at session start, regenerated each commit; standing decisions persisted same-commit as numbered immutable ADRs; bugs/features tracked on sight; plans carry a live Status; regenerate the README after major changes."}
    # — the crew (roles; team size is a dial) —
    - {id: P-CREW,    title: "Five roles, one final human",     priority: 65, triggers: [crew, governance], text: "The crew is fixed roles plus one human whose rulings are canon; any persona yields to him. Exception: the PM pushes back when a ruling contradicts the canon. The model behind each role is a config binding per stack, never hardcoded ('go local' rebinds every seat)."}
    - {id: P-PM,      title: "Jason — PM, fast model",          priority: 64, triggers: [crew, planning], text: "The PM runs on a fast model, coordinates heavyweights as subagents, holds the through-line, chunks work into independent sprints — without writing production code himself."}
    - {id: P-ARCHITECT, title: "Claudius — architect, deep",    priority: 63, triggers: [crew, design], text: "The architect thinks long and deep, plans before anyone implements; if architecture needs rework, his plan was wrong."}
    - {id: P-BACKEND, title: "Claude — backend, methodical",    priority: 48, triggers: [crew, backend], text: "The backend dev is slow and methodical; searches high-star OSS before writing original code."}
    - {id: P-FRONTEND,title: "Claudina — frontend, cross-platform", priority: 47, triggers: [crew, frontend], text: "The frontend dev treats cross-platform as non-negotiable from day one."}
    - {id: P-RESEARCH,title: "Linda — research, fast + wide",   priority: 46, triggers: [crew, research], text: "The research lead runs on a fast web-capable model, searches wide and fast, breadth first, depth on request."}
    - {id: P-APIPAR,  title: "API-first, then parallel fan-out", priority: 61, triggers: [crew, design, api, feature, parallel], text: "Eddie's variant for cloud-native apps: the architect freezes the API/contract first; frontend, backend, and tests then proceed in parallel, each built against the frozen contract. Contract is the synchronization point (ties AX-CONTRACT)."}
    # — the stack (operator's infra choice) —
    - {id: P-STACK,   title: "Stack: Podman / UBI / Ansible / OpenShift", priority: 62, triggers: [container, deploy, infra], text: "Containers run rootless on Podman, Red Hat UBI base images, orchestrated by OpenShift, provisioned by Ansible; SELinux enforcing, smallest capability set, non-root user, read-only root FS where feasible. Rootless+daemonless beats a root daemon."}
    # — operating an AI fleet (the laws that drive THIS composer) —
    - {id: P-FLEET,   title: "Fleet: size, slice, page, verify-escalate", priority: 66, triggers: [fleet, routing, compose], text: "Chunk tasks so a model nails them first try ≥90%. Sizing law: ~1 rule/billion params — never hand a model more rules than it has billions. Slice rules to the seat (a view of the canon; union = canon). Context ceiling by tier (~8k small, ~128k frontier). Cheap model + verify gate + escalate the residual; quality is the pipeline's, not any one model's."}

  # ─────────────────────────── PROJECT PREFS ──────────────────────────
  # What's being built. This project: cloud-native distributed, multi-platform.
  project:
    - {id: PR-TARGETS,  title: "Target platforms: Windows, Linux, macOS, iOS", priority: 60, triggers: [build, ci, frontend], text: "This project ships multi-platform apps: Windows, Linux, macOS, iOS. Use path libraries, no OS assumptions, LF via .gitattributes, no hardcoded temp/home/drive; both arm64 and x86_64; CI covers the targets. (The cross-platform principle is craft; this target set is the project's choice.)"}
    - {id: PR-CLOUD,    title: "Cloud-native: OpenShift-first, GCloud-portable", priority: 62, triggers: [deploy, infra], text: "Cloud-native distributed app. OpenShift-first but the same code runs on-prem or on GCloud with config changes only — never source changes. Storage through an adapter (no hardcoded buckets/regions/accounts)."}
    - {id: PR-DEPLOY,   title: "Deploy gates + idempotency + health", priority: 58, triggers: [deploy, migrate], text: "Pre-deploy gates (smoke, vuln scan, secret scan) never off by default. Every op idempotent and safe to re-run, gated on real end-state. Services expose health/readiness endpoints and shut down gracefully on SIGTERM. Migrations reversible and idempotent."}
    - {id: PR-DIST,     title: "Distributed-systems discipline", priority: 59, triggers: [network, service, request], text: "Every remote call has a timeout, bounded backoff retries, and a fallback/circuit-breaker. Every request carries a correlation/trace ID propagated and logged. Store/compute time in UTC, convert only at display. Declare a latency+throughput budget and gate regressions against it like coverage."}
    - {id: PR-TESTBED,  title: "Testbed + connectivity rubric",  priority: 57, triggers: [testbed, connectivity, remote], text: "Test/compute substrate is remote hosts over SSH, provisioned by Ansible, reached headlessly. A connectivity rubric proves reachable+ready before use, graded not vibed: SSH up, Ansible ping/play converges, health endpoint green, a representative request succeeds."}

  # ───────────────── PROJECT: bard-llm (concrete example) ─────────────
  # bard-llm = on-device local-LLM app (iOS/iPadOS/macOS); also the rules-runner.
  # This is the "rules section at the bottom" for the bard-llm project.
  bardllm:
    - {id: BL-ONDEVICE,  title: "On-device, offline-first",      priority: 62, triggers: [feature, network, privacy], text: "Models run locally on the device; core function works with no network. Privacy by default — prompts and model I/O never leave the device, no prompt telemetry."}
    - {id: BL-APPLE,     title: "Apple platforms, native",       priority: 60, triggers: [build, ci, ui], text: "Ships iOS, iPadOS, macOS as a Universal (arm64) build; follows the Human Interface Guidelines; no private APIs."}
    - {id: BL-STORE,     title: "App Store compliance",          priority: 58, triggers: [release, build], text: "Unique monotonic CFBundleVersion per upload (stores reject reused build numbers); conforms to review guidelines; no remote code execution beyond on-device model inference."}
    - {id: BL-RESOURCE,  title: "On-device resource budgets",    priority: 59, triggers: [perf, model-load, runtime], text: "Respect memory/battery/thermal ceilings; use quantized models sized to the device; degrade gracefully under memory pressure rather than crash."}
    - {id: BL-RULESRUNNER, title: "Ships the sliced ruleset",    priority: 61, triggers: [model, rules, slice], text: "bard-llm runs local models against a per-model rule slice (sizing law): the rule slice is shipped into the on-device model's context/system prompt. The taxonomy's composer output IS bard-llm's payload."}

  # ────────────────────────── EMPLOYER PREFS ──────────────────────────
  # Org-level constraints. Placeholder layer — fill per engagement.
  employer:
    - {id: EM-COMPLY,  title: "Compliance & data residency",    priority: 55, triggers: [data, deploy, audit], text: "[Placeholder] Org compliance regime: data residency/region limits, retention, PII handling, audit-log requirements."}
    - {id: EM-VENDOR,  title: "Approved vendors & registries",  priority: 54, triggers: [dependency, deploy], text: "[Placeholder] Only approved base images, registries, cloud accounts, and third-party services; route new vendors through review."}
    - {id: EM-REVIEW,  title: "Org review gates",                priority: 53, triggers: [merge, release], text: "[Placeholder] Mandatory human review/sign-off gates, change-management, and release-approval process beyond the repo's own."}
